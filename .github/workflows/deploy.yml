name: Deploy to GitHub Pages

on:
  # 推送到 main 分支时自动部署
  push:
    branches: [main]
  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# 赋予 GITHUB_TOKEN 发布 Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，避免互相覆盖
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
